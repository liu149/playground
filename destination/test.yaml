openapi: 3.0.3
info:
  title: Lib Store Explorer API
  description: API for downloading libraries from lib-store
  version: v1
servers:
  - url: /v1

paths:
  /libraries:
    get:
      operationId: listLibraries
      summary: Get the full library index
      description: Returns the raw library.yaml index file content
      tags:
        - libraries
      responses:
        '200':
          description: Library index in YAML format
          content:
            application/yaml:
              schema:
                type: string
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /libraries/{name}/versions/{version}/download:
    get:
      operationId: downloadLibraryVersion
      summary: Download a library ZIP file by name and version
      description: Looks up the library in the index and downloads the corresponding ZIP file
      tags:
        - libraries
      parameters:
        - name: name
          in: path
          required: true
          description: Library name
          schema:
            type: string
        - name: version
          in: path
          required: true
          description: Library version
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/FileDownloadResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

components:
  responses:
    FileDownloadResponse:
      description: Library archive file content (.zip or .tar.gz)
      headers:
        Content-Disposition:
          description: Attachment filename, e.g. attachment; filename=havoc-1.1.43.zip
          schema:
            type: string
      content:
        application/zip:
          schema:
            type: string
            format: binary
        application/gzip:
          schema:
            type: string
            format: binary

    NotFoundResponse:
      description: Library or version not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InternalServerErrorResponse:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: Error type
        message:
          type: string
          description: Error message
        details:
          type: object
          description: Additional error details
